// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
function ev(){
  const $=id=>document.getElementById(id);
  const on=(id,fn)=>{const el=$(id);if(el)el.addEventListener('click',fn)};
  // tabs / nav
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;render()}));
  document.querySelectorAll('[data-ccy]').forEach(el=>el.addEventListener('click',()=>{S.ccy=el.dataset.ccy;render()}));
  document.querySelectorAll('[data-pv]').forEach(el=>el.addEventListener('click',()=>{S.pivot=el.dataset.pv;S.selAsset=null;render()}));
  document.querySelectorAll('[data-fb]').forEach(el=>el.addEventListener('click',()=>{S.fb=el.dataset.fb;render()}));
  document.querySelectorAll('[data-fa]').forEach(el=>el.addEventListener('click',()=>{S.fa=el.dataset.fa;render()}));
  document.querySelectorAll('[data-fs]').forEach(el=>el.addEventListener('click',()=>{S.fs=el.dataset.fs;render()}));
  // Closed positions toggle — uses event delegation since button is in string-built HTML
  document.querySelectorAll('[data-toggle-closed]').forEach(el=>el.addEventListener('click',()=>{S.showClosed=!S.showClosed;render();}));
  document.querySelectorAll('[data-hid]').forEach(el=>el.addEventListener('click',()=>{S.selId=el.dataset.hid;S.modal='detail';render()}));
  // Donut / legend clicks → select asset class
  document.querySelectorAll('[data-ac]').forEach(el=>el.addEventListener('click',()=>{
    const k=el.dataset.ac;
    S.selAsset=S.selAsset===k?null:k;
    render();
    if(S.selAsset){
      // scroll detail panel into view smoothly
      setTimeout(()=>{
        const det=document.querySelector('[data-detail-panel]');
        if(det)det.scrollIntoView({behavior:'smooth',block:'start'});
      },80);
    }
  }));
  // Clear asset selection
  document.querySelectorAll('[data-ac-clear]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();S.selAsset=null;render();
  }));
  // Strategy drawer: click on bar segment or detail row
  document.querySelectorAll('[data-sd-broker][data-sd-strat]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const{sdBroker:brokerId,sdStrat:strategy}=el.dataset;
    if(S.stratDrawer?.brokerId===brokerId&&S.stratDrawer?.strategy===strategy){
      S.stratDrawer=null; // toggle off
    }else{
      S.stratDrawer={brokerId,strategy};
    }
    render();
  }));
  // Drawer close
  on('drawer-close',()=>{S.stratDrawer=null;render()});
  const dov=$('drawer-overlay');if(dov)dov.addEventListener('click',()=>{S.stratDrawer=null;render()});
  // header
  on('xp',fetchPrices);on('xcsv',openCSV);on('xadd',openAdd);
  on('xadd2',openAdd);on('xcash',openCash);
  // modal close
  on('mc',closeM);const mo=$('mo');if(mo)mo.addEventListener('click',e=>{if(e.target===mo)closeM()});
  // add/edit
  on('msave',saveHolding);on('mdel',()=>delH(S.selId));
  // cash modal
  on('csave',saveCash);
  // detail
  // Tag picker toggles
  on('tag-ac-btn',()=>{S.tagPicker=S.tagPicker==='ac'?null:'ac';render();});
  on('tag-st-btn',()=>{S.tagPicker=S.tagPicker==='st'?null:'st';render();});
  // Set asset class
  document.querySelectorAll('[data-set-ac]').forEach(el=>el.addEventListener('click',()=>{
    const h=S.holdings.find(x=>x.id===S.selId);if(!h)return;
    h.assetClass=el.dataset.setAc;h.sector=el.dataset.setAc;
    DB.sh(S.holdings);S.tagPicker=null;render();
    toast('✓ 类别已更新为 '+el.dataset.setAc);
  }));
  // Set strategy
  document.querySelectorAll('[data-set-st]').forEach(el=>el.addEventListener('click',()=>{
    const h=S.holdings.find(x=>x.id===S.selId);if(!h)return;
    h.strategy=el.dataset.setSt;
    DB.sh(S.holdings);S.tagPicker=null;render();
    toast('✓ 策略已更新为 '+el.dataset.setSt);
  }));
  on('dedit',()=>{
    const h=S.holdings.find(x=>x.id===S.selId);if(!h)return;
    if(h.isCash){S.form={...h};S.modal='cash';render()}
    else{S.form={...h};S.modal='edit';render()}
  });
  on('dprice',()=>{
    const h=S.holdings.find(x=>x.id===S.selId);if(!h)return;
    const v=prompt(`更新 ${h.name} 现价（${h.currency}）：`,h.currentPrice);
    if(v!==null&&!isNaN(parseFloat(v))){h.currentPrice=parseFloat(v);h.priceUpdatedAt=Date.now();DB.sh(S.holdings);toast('✓ 价格已更新');render()}
  });
  on('ddel',()=>delH(S.selId));
  // csv
  const dz=$('dz'),cfi=$('cfi');
  if(dz){dz.addEventListener('click',()=>cfi&&cfi.click());dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])rdCSV(e.dataTransfer.files[0])})}
  if(cfi)cfi.addEventListener('change',e=>{if(e.target.files[0])rdCSV(e.target.files[0])});
  on('mimport',importCSV);
  // settings
  on('xrr',fetchRates);on('xpnow',fetchPrices);
  on('xexp',exportData);
  on('xreset',()=>{if(confirm('重置为内置持仓（老虎5.14+平安）？当前数据将被覆盖。')){S.holdings=seed();DB.sh(S.holdings);toast('✓ 已重置');render()}});
  on('xclr',()=>{if(confirm('确定清除所有数据？')){S.holdings=[];DB.sh([]);toast('✓ 已清除');render()}});
  // trades tab
  on('xadd-trade',()=>{
    S.modal='trade';
    S.tradeForm={side:'buy',date:new Date().toISOString().slice(0,10),currency:'USD'};
    render();
  });
  // trade side toggle
  document.querySelectorAll('[data-trade-side]').forEach(el=>el.addEventListener('click',()=>{
    S.tradeForm={...S.tradeForm,side:el.dataset.tradeSide};render();
  }));
  // holding selector change
  const trH=document.getElementById('tr-holding');
  if(trH)trH.addEventListener('change',()=>{
    const val=trH.value;
    if(val==='__new__'){
      S.tradeForm={...S.tradeForm,holdingId:'__new__'};
    } else if(val){
      const h=S.holdings.find(x=>x.id===val);
      if(h)S.tradeForm={...S.tradeForm,holdingId:val,ticker:h.ticker,name:h.name,
        brokerId:h.brokerId,currency:h.currency};
    } else {
      S.tradeForm={...S.tradeForm,holdingId:''};
    }
    render();
  });
  // commit trade
  on('tr-commit',()=>{
    const g=id=>document.getElementById(id)?.value;
    const qty=parseFloat(g('tr-qty')),price=parseFloat(g('tr-price'));
    if(!qty||!price||isNaN(qty)||isNaN(price)){toast('⚠ 请填写数量和价格');return}
    const date=g('tr-date')||new Date().toISOString().slice(0,10);
    let ticker,name,brokerId,currency;
    if(S.tradeForm.holdingId&&S.tradeForm.holdingId!=='__new__'){
      const h=S.holdings.find(x=>x.id===S.tradeForm.holdingId);
      if(!h){toast('⚠ 找不到标的');return}
      ticker=h.ticker;name=h.name;brokerId=h.brokerId;currency=h.currency;
    } else {
      ticker=(g('tr-ticker')||S.tradeForm.ticker||'').trim();
      name=(g('tr-name')||S.tradeForm.name||'').trim()||ticker;
      brokerId=g('tr-broker')||S.tradeForm.brokerId||'tiger';
      currency=g('tr-cur')||S.tradeForm.currency||'USD';
      if(!ticker){toast('⚠ 请输入证券代码');return}
    }
    const trade={
      brokerId,ticker,name,currency,date,
      side:S.tradeForm.side||'buy',
      qty,price,
      note:(g('tr-note')||S.tradeForm.note||'').trim(),
    };
    commitTrade(trade);
    const verb=trade.side==='buy'?'买入':'卖出';
    toast(`✓ 已记录 ${verb} ${ticker} × ${qty}，持仓已更新`);
    S.modal=null;render();
  });
  // delete trade
  document.querySelectorAll('[data-del-trade]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    if(!confirm('删除这笔交易记录？持仓将相应回滚。'))return;
    deleteTrade(el.dataset.delTrade);
    toast('✓ 已删除，持仓已更新');render();
  }));
  // history tab
  on('xsnap',()=>{
    const s=saveSnapshot(new Date().toISOString().slice(0,10));
    toast(`✓ 已记录 ${s.date} 快照`);render();
  });
  on('xsnap-export',()=>{
    const blob=new Blob([JSON.stringify({snapshots:S.snapshots,exported:new Date().toISOString()},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`history_${new Date().toISOString().slice(0,10)}.json`;a.click();
    toast('✓ 历史数据已导出');
  });
  document.querySelectorAll('[data-hr]').forEach(el=>el.addEventListener('click',()=>{S.histRange=el.dataset.hr;render()}));
  document.querySelectorAll('[data-hm]').forEach(el=>el.addEventListener('click',()=>{S.histMetric=el.dataset.hm;render()}));
  document.querySelectorAll('[data-hb]').forEach(el=>el.addEventListener('click',()=>{S.histBroker=el.dataset.hb;render()}));
  document.querySelectorAll('[data-del-snap]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const d=el.dataset.delSnap;
    if(!confirm(`删除 ${d} 的快照？`))return;
    S.snapshots=S.snapshots.filter(s=>s.date!==d);
    DB.ssnap(S.snapshots);toast('✓ 已删除');render();
  }));
  document.querySelectorAll('[data-dismiss-risk]').forEach(el=>el.addEventListener('click',()=>{S.riskDismissed=true;render()}));
  // History import modal
  on('hist-open-import',()=>{S.histImportModal=true;S.histImportFiles=[];render()});
  on('hist-modal-close',()=>{S.histImportModal=false;S.histImportFiles=[];render()});
  on('hist-overlay',()=>{S.histImportModal=false;S.histImportFiles=[];render()});
  // Date input inside modal
  const hdi=document.getElementById('hist-date-input');
  if(hdi)hdi.addEventListener('change',e=>{S.histImportDate=e.target.value});
  // Multi-file CSV upload
  const hdz=document.getElementById('hist-dz');
  const hci=document.getElementById('hist-csv-input');
  if(hdz)hdz.addEventListener('click',()=>hci&&hci.click());
  if(hci)hci.addEventListener('change',e=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    S.histImportFiles=[];
    let loaded=0;
    files.forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{
        const{brokerId,holdings}=parseBrokerCSV(ev.target.result);
        S.histImportFiles.push({name:file.name,brokerId,holdings});
        loaded++;
        if(loaded===files.length)render();
      };
      r.readAsText(file,'UTF-8');
    });
  });
  // Commit import
  on('hist-do-import',()=>{
    if(!S.histImportFiles.length)return;
    const date=S.histImportDate||new Date().toISOString().slice(0,10);
    const snap=buildSnapshotFromFiles(date,S.histImportFiles);
    mergeSnapshot(snap);
    toast(`✓ 已保存 ${date} 快照（${S.histImportFiles.length} 个账户）`);
    S.histImportModal=false;S.histImportFiles=[];render();
  });
}

function openAdd(){S.form={brokerId:'tiger',currency:'HKD',assetClass:'美股',strategy:'配置'};S.selId=null;S.modal='add';render()}
function openCash(){S.form={brokerId:'tiger',currency:'HKD'};S.modal='cash';render()}
function openCSV(){S.modal='csv';S.csvRaw='';S.csvParsed=[];render()}
function closeM(){S.modal=null;S.selId=null;S.tagPicker=null;S.csvRaw='';S.csvParsed=[];render()}

function saveHolding(){
  const g=id=>document.getElementById(id)?.value;
  const ticker=(g('ft')||'').trim(),qty=parseFloat(g('fq')),price=parseFloat(g('fp'));
  if(!ticker||isNaN(qty)||isNaN(price)){toast('⚠ 代码、数量、现价必填');return}
  const cost=parseFloat(g('fco'));
  const obj={brokerId:g('fb'),ticker,name:(g('fn')||'').trim()||ticker,qty,avgCost:isNaN(cost)?0:cost,currentPrice:price,currency:g('fcur')||'HKD',assetClass:g('fa')||'美港股',strategy:g('fs')||'配置',sector:g('fa')||'美港股',isCash:false};
  if(S.modal==='edit'&&S.selId){
    const i=S.holdings.findIndex(h=>h.id===S.selId);
    if(i>=0)S.holdings[i]={...S.holdings[i],...obj};
    toast('✓ 已更新');
  }else{S.holdings.push({id:uid(),...obj,priceUpdatedAt:null});toast('✓ 已添加')}
  DB.sh(S.holdings);closeM();
}

function saveCash(){
  const g=id=>document.getElementById(id)?.value;
  const amt=parseFloat(g('ca'));const name=(g('cn')||'').trim();
  if(isNaN(amt)||amt<=0){toast('⚠ 请输入有效金额');return}
  const obj={
    id:S.form.id||uid(),brokerId:g('cb')||'tiger',
    ticker:'CASH',name:name||'现金',
    qty:1,avgCost:amt,currentPrice:amt,
    currency:g('ccur')||'HKD',
    assetClass:'现金',strategy:'现金',sector:'现金',
    isCash:true,cashAmount:amt,priceUpdatedAt:null,
  };
  if(S.form.id){
    const i=S.holdings.findIndex(h=>h.id===S.form.id);
    if(i>=0){S.holdings[i]={...S.holdings[i],...obj};toast('✓ 已更新')}
  }else{S.holdings.push(obj);toast('✓ 现金已添加')}
  DB.sh(S.holdings);closeM();
}

function delH(id){
  if(!id)return;if(!confirm('确定删除？'))return;
  S.holdings=S.holdings.filter(h=>h.id!==id);DB.sh(S.holdings);toast('✓ 已删除');closeM();
}
function rdCSV(file){const r=new FileReader();r.onload=e=>{S.csvRaw=e.target.result;S.csvParsed=parseCSV(S.csvRaw);render()};r.readAsText(file,'UTF-8')}
function importCSV(){if(!S.csvParsed.length)return;S.holdings=[...S.holdings,...S.csvParsed];DB.sh(S.holdings);toast(`✓ 导入了 ${S.csvParsed.length} 条`);closeM()}
function exportData(){
  const b=new Blob([JSON.stringify({holdings:S.holdings,rates:S.rates,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`portfolio_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('✓ 已导出');
}

try{
  render();
}catch(e){
  document.getElementById('app').innerHTML='<div style="color:#ff6b7a;padding:20px;font-family:monospace">Error: '+e.message+'<br><pre>'+e.stack+'</pre></div>';
  console.error('render() crashed:',e);
}

// Fetch prices on first load
setTimeout(fetchPrices, 1500);
</script>
</body>
</html>
